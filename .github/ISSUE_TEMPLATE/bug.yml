name: Bug Report
description: Something isn't working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: input
    id: version
    attributes:
      label: arc-jobs version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: dropdown
    id: adapter
    attributes:
      label: Adapter
      options:
        - MemoryAdapter
        - SqliteAdapter
        - RedisAdapter
        - Not applicable
    validations:
      required: true

  - type: input
    id: runtime
    attributes:
      label: Runtime & version
      placeholder: "Bun 1.2.0 / Node 22.0.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 14, Ubuntu 22.04, Windows 11"

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal code snippet or steps that reliably reproduce the issue.
      render: javascript
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Error messages, stack traces, arc.config.json snippet, etc.
